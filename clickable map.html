<title>India Map Clickable</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #f4f4f4;
}

svg {
    width: 700px;
}

/* Points */
.point {
    fill: red;
    cursor: pointer;
}

.point:hover {
    fill: yellow;
}

/* Grid */
.grid line {
    stroke: #999;
    stroke-width: 0.5;
}
</style>
</head>

<body>

<h2>Name: Sumit Kumar Yadav </h2>
