<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumit - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#6c5ce7;}
        body{font-family:'Poppins',sans-serif;}
        .hero{background:linear-gradient(135deg,var(--primary),#a29bfe);color:white;padding:100px 0;}
        .hero h1{font-size:3rem;font-weight:700;}
        .card-hover{transition:all 0.3s ease;}
        .card-hover:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,0.1);}
        .navbar-brand{color:var(--primary)!important;font-weight:700;}
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Sumit</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#services">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero text-center">
        <div class="container">
            <h1 class="mb-4">Hi, I'm <span class="text-white">Sumit</span></h1>
            <p class="lead mb-4">Creative Designer & Developer</p>
            <a href="#contact" class="btn btn-light btn-lg px-5">Get Started</a>
        </div>
    </section>

    <!-- Services -->
    <section id="services" class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">My Services</h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card card-hover h-100 text-center p-4 border-0 shadow">
                        <i class="fas fa-paint-brush fa-3x text-primary mb-3"></i>
                        <h4>UI/UX Design</h4>
                        <p>Beautiful & intuitive designs</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-hover h-100 text-center p-4 border-0 shadow">
                        <i class="fas fa-code fa-3x text-primary mb-3"></i>
                        <h4>Web Development</h4>
                        <p>Fast & responsive websites</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-hover h-100 text-center p-4 border-0 shadow">
                        <i class="fas fa-mobile-alt fa-3x text-primary mb-3"></i>
                        <h4>Mobile Apps</h4>
                        <p>Native & cross-platform</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="py-5 bg-dark text-white">
        <div class="container">
            <h2 class="text-center mb-5">Contact Me</h2>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6"><input type="text" class="form-control" placeholder="Name"></div>
                            <div class="col-md-6"><input type="email" class="form-control" placeholder="Email"></div>
                            <div class="col-12"><textarea class="form-control" rows="4" placeholder="Message"></textarea></div>
                            <div class="col-12"><button class="btn btn-primary w-100">Send Message</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(a=>a.addEventListener('click',e=>{
            e.preventDefault();document.querySelector(a.getAttribute('href')).scrollIntoView({behavior:'smooth'});
        }));
    </script>
</body>
</html>
